version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: findwithin_db
    environment:
      POSTGRES_USER: findwithin_user
      POSTGRES_PASSWORD: findwithin_password
      POSTGRES_DB: findwithin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findwithin_user -d findwithin"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: findwithin_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./benchmarks:/app/benchmarks
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: findwithin_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  pgdata:
